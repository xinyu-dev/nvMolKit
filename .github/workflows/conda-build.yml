name: Conda Forge Local Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: conda-forge-build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  conda-forge-build:
    name: py${{ matrix.python }} rdkit${{ matrix.rdkit }} cuda${{ matrix.cuda }}
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          # Min python + min rdkit + min cuda supported by the feedstock.
          - python: "3.10"
            rdkit: "2025.3.3"
            cuda: "12.6"
            config: linux_64_c_compiler_version13c_stdlib_version2.17cuda_compiler_version12.6cxx_compiler_version13libboost_devel1.86libboost_headers1.86libboost_python_devel1.86librdkit_dev2025.3.3_h4d503be0
          # Intermediate python + intermediate rdkit, covers the middle cuda.
          - python: "3.12"
            rdkit: "2025.9.2"
            cuda: "12.9"
            config: linux_64_c_compiler_version14c_stdlib_version2.17cuda_compiler_version12.9cxx_compiler_version14libboost_devel1.86libboost_headers1.86libboost_python_devel1.86librdkit_dev2025.9.2_h272ea129
          # Max python + max rdkit + max cuda supported by the feedstock.
          - python: "3.13"
            rdkit: "2026.3.1"
            cuda: "13.0"
            config: linux_64_c_compiler_version14c_stdlib_version2.28cuda_compiler_version13.0cxx_compiler_version14libboost_devel1.88libboost_headers1.88libboost_python_devel1.88librdkit_dev2026.3.1_hf8c537c7

    steps:
      - name: Check out source tree
        uses: actions/checkout@v4
        with:
          path: source

      - name: Clone feedstock
        shell: bash
        run: |
          set -xeuo pipefail
          git clone --depth 1 https://github.com/conda-forge/nvmolkit-feedstock.git nvmolkit-feedstock

      - name: Inject local source tree
        shell: bash
        run: |
          set -xeuo pipefail
          mkdir -p nvmolkit-feedstock/source
          tar --exclude=.git -C source -cf - . | tar -C nvmolkit-feedstock/source -xf -
          grep -q '^source:' nvmolkit-feedstock/recipe/recipe.yaml
          sed -i '/^source:/,/^[^[:space:]]/{/^source:/!{/^[^[:space:]]/!d}}' \
            nvmolkit-feedstock/recipe/recipe.yaml
          sed -i '/^source:/a\  path: /home/conda/feedstock_root/source' \
            nvmolkit-feedstock/recipe/recipe.yaml

      - name: Build feedstock package
        working-directory: nvmolkit-feedstock
        shell: bash
        run: |
          set -xeuo pipefail
          python3 build-locally.py "${{ matrix.config }}"

      - name: Upload conda artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: nvmolkit-conda-py${{ matrix.python }}-rdkit${{ matrix.rdkit }}-cuda${{ matrix.cuda }}
          path: |
            nvmolkit-feedstock/build_artifacts/**/*.conda
            nvmolkit-feedstock/build_artifacts/**/*.tar.bz2
          if-no-files-found: warn

      - name: Upload failure context
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nvmolkit-conda-debug-py${{ matrix.python }}-rdkit${{ matrix.rdkit }}-cuda${{ matrix.cuda }}
          path: |
            nvmolkit-feedstock/recipe/recipe.yaml
            nvmolkit-feedstock/build_artifacts/**/build_env_setup.sh
            nvmolkit-feedstock/build_artifacts/**/*.log
          if-no-files-found: warn
