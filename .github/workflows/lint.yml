name: Lint

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out source tree
        uses: actions/checkout@v4

      - name: Install clang-format 17
        shell: bash
        run: |
          set -xeuo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates gnupg wget
          wget -qO - https://apt.llvm.org/llvm-snapshot.gpg.key | \
            sudo gpg --dearmor -o /usr/share/keyrings/llvm-snapshot.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-snapshot.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-17 main" | \
            sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format-17

      - name: Run clang-format check
        shell: bash
        run: |
          set -xeuo pipefail
          bash admin/run_clang_format.sh -d

  copyright-check:
    name: copyright-check
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out source tree
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run copyright header check
        shell: bash
        run: |
          set -xeuo pipefail
          bash admin/apply_copyright.sh -d

  cmake-format-lint:
    name: cmake-format-lint
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out source tree
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cmakelang
        shell: bash
        run: |
          set -xeuo pipefail
          python -m pip install --upgrade pip
          python -m pip install cmakelang==0.6.13

      - name: Run cmake-format and cmake-lint checks
        shell: bash
        run: |
          set -xeuo pipefail
          bash admin/run_cmake_format_lint.sh -d

  include-check:
    name: include-check
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out source tree
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run include-path check
        shell: bash
        run: |
          set -xeuo pipefail
          bash admin/run_include_check.sh -d

  ruff-format:
    name: ruff-format
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out source tree
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        shell: bash
        run: |
          set -xeuo pipefail
          python -m pip install --upgrade pip
          python -m pip install ruff==0.15.8

      - name: Run ruff format check
        shell: bash
        run: |
          set -xeuo pipefail
          bash admin/run_ruff_format.sh -d
